name: Frontend Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read frontend version
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            export GHCR_USER='${{ github.actor }}'
            export GHCR_TOKEN='${{ secrets.GITHUB_TOKEN }}'
            export FRONTEND_VERSION='${{ steps.version.outputs.value }}'

            cd /home/ec2-user/apps/deploy

            if grep -q '^FRONTEND_VERSION=' .env; then
              sed -i "s/^FRONTEND_VERSION=.*/FRONTEND_VERSION=${FRONTEND_VERSION}/" .env
            else
              echo "FRONTEND_VERSION=${FRONTEND_VERSION}" >> .env
            fi

            if ! grep -q '^BACKEND_VERSION=' .env; then
              echo "BACKEND_VERSION=0.0.1-SNAPSHOT" >> .env
            fi

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose pull frontend
            docker compose up -d backend frontend
            docker image prune -f
